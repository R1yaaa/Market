openapi: 3.0.0
info:
  title: Handelsplatz API
  version: 1.0.0
  description: REST-API für einen digitalen Handelsplatz

paths:
  /register:
    post:
      summary: Nutzer registrieren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Registrierung erfolgreich

  /login:
    post:
      summary: Token-Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        '200':
          description: Login erfolgreich

  /account:
    get:
      summary: Kontostand & Besitz abfragen
      responses:
        '200':
          description: Rückgabe von Coins und Inventar

  /prices:
    get:
      summary: Aktuelle Handelswerte abrufen
      responses:
        '200':
          description: Liste aktueller Marktpreise

  /buy:
    post:
      summary: Kauf von Handelsgut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: string
                quantity:
                  type: integer
              required:
                - item
                - quantity
      responses:
        '200':
          description: Kauf erfolgreich

  /sell:
    post:
      summary: Verkauf von Handelsgut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: string
                quantity:
                  type: integer
              required:
                - item
                - quantity
      responses:
        '200':
          description: Verkauf erfolgreich

  /offers:
    get:
      summary: Alle Angebote am Markt
      responses:
        '200':
          description: Liste aller Markteinträge

